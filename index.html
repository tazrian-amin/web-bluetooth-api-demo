<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MS Connect</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="style.css" />
    <!-- Load Chart.js Library via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>MS Connect</h1>

      <button id="connectBtn" class="btn" onclick="connectBLE()">
        Connect to Device
      </button>
      <button
        id="disconnectBtn"
        class="btn btn-disconnect"
        onclick="disconnectBLE()"
      >
        Disconnect
      </button>

      <div class="sensor-container">
        <div class="label">Raw ADC Value</div>
        <div id="valueDisplay" class="value">--.--</div>
      </div>

      <!-- Bidirectional control: push a new sample period to the firmware over BLE -->
      <div id="controlPanel" class="control-container">
        <div class="label">Sample Period (seconds)</div>
        <div class="period-control">
          <input
            type="number"
            id="periodInput"
            min="1"
            max="86400"
            step="1"
            placeholder="60"
          />
          <button id="setPeriodBtn" class="btn" onclick="setSamplePeriod()">
            Set Period
          </button>
        </div>
        <div id="periodStatus" class="period-status"></div>
      </div>

      <!-- Real-Time Time Series Data Chart Window -->
      <div class="chart-container" id="chartScroll">
        <div class="chart-inner" id="chartInner">
          <canvas id="telemetryChart"></canvas>
        </div>
      </div>

      <div id="logSection" class="log-section" style="display: none">
        <div class="label">Send Command</div>
        <div class="command-row">
          <input
            type="text"
            id="cmdInput"
            placeholder='{"cmd":"get_config"} or get_config'
          />
          <button id="sendCmdBtn" class="btn" onclick="sendCustomCommand()">
            Send
          </button>
          <button id="quickGetBtn" class="btn" onclick="sendGetConfig()">
            Quick get_config
          </button>
          <button
            id="clearLogBtn"
            class="btn btn-secondary"
            onclick="clearResponseLog()"
          >
            Clear Log
          </button>
        </div>
        <div id="rawResponses" class="log-box"></div>
        <div class="label">JSON Viewer</div>
        <pre id="jsonViewer" class="json-viewer"></pre>
      </div>

      <div id="status">Status: Disconnected</div>
    </div>

    <div class="app-footer">Version <span id="appVersion">—</span></div>

    <div id="updateToast" class="update-toast" hidden>
      <span class="update-toast__message">A new version is available</span>
      <button id="updateBtn" class="btn btn-small">Update Now</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
